<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIGHT - 당신만의 공간 기록</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .hero {
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: white;
            padding: 50px 20px;
            border-radius: 0 0 50% 50%;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            margin-top: 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 16px;
        }
        .features-container {
            width: 100%;
            overflow: hidden;
            position: relative;
            margin-top: 20px;
        }
        .features-slider {
            display: flex;
            transition: transform 0.5s ease-in-out;
            width: 500%;
        }
        .feature-item {
            flex: 1;
            min-width: 100%;
            box-sizing: border-box;
            padding: 20px;
            background: #e9ecef;
            border-radius: 10px;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
        }
        .features-wrapper {
            width: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }
        footer {
            margin-top: 20px;
            padding: 20px;
            background: #343a40;
            color: white;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>LIGHT</h1>
        <p>당신의 경험을 바탕으로 신뢰할 수 있는 장소 정보를 공유하는 SNS</p>
        <a href="#" class="btn">앱 다운로드</a>
    </div>
    <div class="container">
        <h2>LIGHT란?</h2>
        <p>LIGHT는 사용자의 위치 기반 경험을 기록하고 공유할 수 있는 폐쇄형 SNS 플랫폼입니다.</p>
        <p>비슷한 취향의 사용자들과 신뢰할 수 있는 정보를 교환하세요.</p>
    </div>
    <div class="features-container">
        <h2>LIGHT를 이용하면?</h2>
        <div class="features-wrapper">
            <div class="features-slider" id="slider">
                <div class="feature-item">🔍 신뢰할 수 있는 장소 리뷰</div>
                <div class="feature-item">📍 개인 맞춤 장소 추천</div>
                <div class="feature-item">👥 그룹 공유 기능</div>
                <div class="feature-item">📊 개인 활동 분석</div>
                <div class="feature-item">🔒 데이터 보호</div>
            </div>
        </div>
    </div>
    <footer>
        <p>&copy; 2025 LIGHT. All Rights Reserved.</p>
    </footer>
    <script>
        let index = 0;
        function slideFeatures() {
            index = (index + 1) % 5;
            document.getElementById("slider").style.transform = `translateX(-${index * 100}%)`;
        }
        setInterval(slideFeatures, 3000);
    </script>
</body>
</html>
